<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A961;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7355;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0f" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- Letter B -->
  <text x="50" y="72" font-family="serif" font-size="60" font-weight="bold" fill="url(#goldGradient)" text-anchor="middle">B</text>
</svg>
