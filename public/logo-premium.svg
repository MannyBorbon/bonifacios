<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E4C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A961;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Decorative lines top -->
  <line x1="80" y1="35" x2="160" y2="35" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6"/>
  <line x1="240" y1="35" x2="320" y2="35" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6"/>
  
  <!-- Main text BONIFACIO'S -->
  <text x="200" y="100" font-family="serif" font-size="52" font-weight="300" letter-spacing="8" fill="url(#goldGrad)" text-anchor="middle" filter="url(#glow)">
    BONIFACIO'S
  </text>
  
  <!-- Decorative diamond -->
  <circle cx="200" cy="120" r="2" fill="url(#goldGrad)" opacity="0.8"/>
  
  <!-- Subtitle RESTAURANT -->
  <text x="200" y="145" font-family="serif" font-size="16" font-weight="300" letter-spacing="12" fill="url(#goldGrad)" text-anchor="middle" opacity="0.9">
    RESTAURANT
  </text>
  
  <!-- Location -->
  <text x="200" y="165" font-family="serif" font-size="11" font-weight="300" letter-spacing="3" fill="url(#goldGrad)" text-anchor="middle" opacity="0.6">
    SAN CARLOS
  </text>
  
  <!-- Decorative lines bottom -->
  <line x1="80" y1="175" x2="160" y2="175" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6"/>
  <line x1="240" y1="175" x2="320" y2="175" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6"/>
</svg>
